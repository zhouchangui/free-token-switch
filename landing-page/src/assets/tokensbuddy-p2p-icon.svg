<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TokensBuddy P2P token economy icon</title>
  <desc id="desc">A rounded app icon showing connected token nodes, flowing peer-to-peer paths, and a lightning route.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 412) rotate(90) scale(520)">
      <stop offset="0" stop-color="#123340"/>
      <stop offset="0.48" stop-color="#071216"/>
      <stop offset="1" stop-color="#020405"/>
    </radialGradient>
    <linearGradient id="frame" x1="142" y1="122" x2="858" y2="912" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1B2D34"/>
      <stop offset="0.45" stop-color="#081013"/>
      <stop offset="1" stop-color="#173225"/>
    </linearGradient>
    <linearGradient id="flowCyan" x1="201" y1="314" x2="803" y2="733" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38E8FF"/>
      <stop offset="0.5" stop-color="#27F3C6"/>
      <stop offset="1" stop-color="#78FF77"/>
    </linearGradient>
    <linearGradient id="tokenGold" x1="392" y1="342" x2="642" y2="671" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7A3"/>
      <stop offset="0.34" stop-color="#FFC842"/>
      <stop offset="0.72" stop-color="#F59B1E"/>
      <stop offset="1" stop-color="#B85E0F"/>
    </linearGradient>
    <linearGradient id="nodeBlue" x1="190" y1="220" x2="380" y2="408" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A9FBFF"/>
      <stop offset="0.55" stop-color="#24D8F4"/>
      <stop offset="1" stop-color="#087B9E"/>
    </linearGradient>
    <linearGradient id="nodeGreen" x1="663" y1="602" x2="837" y2="778" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B7FFC5"/>
      <stop offset="0.52" stop-color="#38E978"/>
      <stop offset="1" stop-color="#159350"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="cyanGlow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="goldGlow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="80" y="80" width="864" height="864" rx="214" fill="url(#bgGlow)"/>
  <rect x="82" y="82" width="860" height="860" rx="212" stroke="url(#frame)" stroke-width="4"/>
  <path d="M178 516C250 327 393 232 544 257C690 281 795 402 815 547C836 694 748 807 589 821C410 838 232 737 178 516Z" stroke="#0E5362" stroke-width="3" stroke-dasharray="10 18" opacity="0.55"/>
